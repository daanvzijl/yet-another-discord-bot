name: PR

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea

      - run: bun install

      - run: hk check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - run: bun install

      - run: bun test
